# Morpheus-Large — ~370M parameters
# Quality escalation if Base doesn't meet targets

# Architecture
d_model: 1024
n_layer: 48
d_state: 128
d_conv: 4
expand: 2
headdim: 64
chunk_size: 256

# Vocabulary
vocab_size: 32000
pad_vocab_size_multiple: 16

# Regularization
residual_in_fp32: true
fused_add_norm: true

# Training
seq_len: 512
batch_size: 64        # Reduced to fit in 48 GB VRAM
gradient_accumulation: 2  # Effective batch = 128

# Optimization
learning_rate: 2.0e-3
min_lr: 1.0e-5
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# Schedule
warmup_tokens: 50_000_000
total_tokens: 10_000_000_000

# Precision
dtype: bfloat16
compile: true

# Logging
log_interval: 50
eval_interval: 1000
save_interval: 5000

# Estimated params: ~370M
# Estimated VRAM: ~30-40 GB (with grad accum)
# Training time: ~5-7 days
# ⚠️ CPU inference latency at this size is risky — benchmark before committing
