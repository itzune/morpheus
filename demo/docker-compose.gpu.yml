# GPU override for Morpheus v2 Mamba Demo
#
# Usage (run from the demo/ directory):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires:
#   - NVIDIA GPU with CUDA support
#   - NVIDIA Container Toolkit (nvidia-docker2) installed on host
#     See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# This override:
#   1. Rebuilds llama.cpp with CUDA support (GGML_CUDA=ON)
#   2. Uses NVIDIA CUDA base images (devel for build, runtime for execution)
#   3. Offloads all layers to GPU (MORPHEUS_NGL=99)
#   4. Reserves GPU device for the container

services:
  demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile
      args:
        BUILD_IMAGE: nvidia/cuda:12.4.0-devel-ubuntu22.04
        RUNTIME_IMAGE: nvidia/cuda:12.4.0-runtime-ubuntu22.04
        GGML_CUDA: "ON"
    environment:
      - MORPHEUS_NGL=99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
